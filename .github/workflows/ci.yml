name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies（必須のみ。任意依存なしでも全機能が動くことを確認）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Config integrity（rule_catalog / fraud_scenarios / detection_params / engagement）
        run: python run.py check-config

      - name: Unit tests（74件）
        run: python -m unittest discover -t . -s tests -v

      - name: End-to-end demo（合成不正の検出力 recall を確認）
        run: python run.py demo
