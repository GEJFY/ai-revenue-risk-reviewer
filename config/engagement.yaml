# エンゲージメント設定（独立性・配備レイヤ・強制アクション）
#
# 売上不正は財務諸表不正であり、独立性の扱いが鋭い（docs/governance.md §2）。
# 「誰が・どの立場で・どの配備で使うか」を構成で明示的に切り替える。
# ここを変えるとエージェントの探索範囲・強制アクション・HITL の硬さが変わる。
#
# ⚠️ 独立性の最終判断は法務確認が前提（要法務確認）。本ファイルは方針の宣言であり、
#    それ自体が独立性を担保するものではない。

version: "1.0"

# --- 利用主体（Track A / B）------------------------------------------------
# track_a: 被監査会社の内部監査・不正調査・コンプライアンス・監査役が自社のために使用（既定）
# track_b: 監査法人が法定監査手続として、または非監査会社向けサービスとして提供
track: track_a

# --- 配備レイヤ（3線 → 2線 → 1線）------------------------------------------
# third_line  : 内部監査／会計監査（定期・検知・独立保証）。フラグのみ、最終判断は人間（既定）
# second_line : 継続モニタリング（準リアルタイム・検知）。例外確認・期末駆け込み/JEの早期把握
# first_line  : 現場リアルタイム（予防）。高精度な決定論ルールのみ硬ブロック、確率的判定は警告止まり
deployment_layer: third_line

# --- 強制アクションの姿勢（配備レイヤに連動）------------------------------
# flag_only    : すべて所見として提示するのみ（3線の既定）
# alert        : 例外アラートを出しトリアージ（2線）
# hard_block   : 高精度決定論ルールに限り経路を硬ブロック（1線のみ）
enforcement:
  probabilistic_actions: flag_only   # ML・エージェント由来は常に flag_only（誤検知の経済性のため）
  deterministic_actions: flag_only   # 3線/2線=flag_only or alert、1線でのみ hard_block を許可
  # 1線で hard_block を許可する「高精度な決定論ルール」の限定リスト（docs/governance.md §2）。
  # これ以外（確率的なML・エージェント）は配備に関わらず硬ブロックしない。
  hard_block_allowlist:
    - CUTOFF-002   # 未出荷計上
    - FICT-001     # 出荷・納品証憑のない売上
    - CREDIT-001   # 与信限度超過
    - CUST-001     # 反社・制裁該当
    - COMPL-002    # 制裁対象・仕向地規制

# --- HITL ゲート（人間の介在点。docs/agent-design.md §3）-------------------
# 高感度カテゴリの探索前に人間の承認を要求するか（G0/G1）。
hitl:
  require_g0_privacy_approval: true   # プライバシー影響のある証憑収集（通信・関連当事者・役職員関係）の前
  require_g1_sensitive_approval: true # 反社/制裁・関連当事者・経営者仕訳の探索前
  # G2（所見の確定前）・G3（是正・通報・開示）は常に人間。構成で無効化できない。

# --- エージェント探索の上限（無限探索の禁止。docs/agent-design.md §4）-------
agent_limits:
  max_iterations: 5          # 1所見あたりの5フェーズ反復上限
  max_tool_calls: 20         # 1所見あたりのツール呼び出し上限
  network_max_hops: 4        # 循環取引ネットワーク探索の深度（ホップ数）上限
  network_max_entities: 200  # 探索対象エンティティ数の上限

# --- プライバシー機能の有効化条件（docs/security-privacy.md §3）------------
# 適法根拠を満たさない個人データ処理は起動しない。false のままなら該当機能は動かさない。
privacy:
  employee_behavior_analysis_enabled: false  # 営業担当（従業員）の行動データ分析（PATT-002 等）
  officer_customer_matching_enabled: false   # 役職員と得意先の関係照合（CUST-005・利益相反）
  legal_basis_note_ja: "利用目的の特定・必要最小限・保存期間・労使協議・本人通知を満たすこと（個情法・労働法／多国籍は GDPR/DPIA）"
