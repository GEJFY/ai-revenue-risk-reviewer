# 売上リスク分析 ルールカタログ
#
# schema (各ルール):
#   id: カテゴリ接頭辞 + 連番（一意）
#   category: 下記カテゴリコード
#   name_ja: ルール名
#   description_ja: 検知内容
#   assertion: リスクに晒される財務諸表アサーション（occurrence/completeness/accuracy/cutoff/classification/valuation/rights_obligations/presentation）
#   severity: low | medium | high | critical
#   base_weight: リスクスコアへの基礎重み（0-40）
#   detection_ja: 検知ロジックの要点（実装の指針。決定論的に評価可能なもの）
#   applies_to: 適用対象（transaction / customer / entity_network / journal / salesperson 等）
#   false_positive_notes_ja: 誤検知の典型と正当な業務理由（必須。アラート疲れ対策）
#   hitl: この所見に人間の確認が必須か
#   references: 関連基準・法令
#
# カテゴリ:
#   CUTOFF 期間帰属・カットオフ / FICT 架空売上・実在性 / CIRC 循環取引・関連当事者 /
#   RECOG 収益認識 / RETURN 返品・赤伝・変動対価 / PRICE 価格・数量・粗利 /
#   CREDIT 与信・回収可能性 / CUST 得意先マスタ・スクリーニング / CTRL 統制・承認・職務分掌 /
#   JE 仕訳・トップサイド調整（統制無効化） / PATT パターン・集中・行動 / COMPL コンプライアンス

version: "1.0"
domain: revenue

rules:

  # ===== CUTOFF: 期間帰属・カットオフ =====
  - id: CUTOFF-001
    category: CUTOFF
    name_ja: 期末駆け込み計上の集中
    description_ja: 期末最終数営業日に売上計上が異常に集中している
    assertion: [cutoff, occurrence]
    severity: high
    base_weight: 22
    detection_ja: 期末最終N営業日の計上件数・金額が、当期の日次平均や過去同期比で統計的に突出
    applies_to: transaction
    false_positive_notes_ja: 月末・期末に締める商習慣、季節性商材、期末納期の大型案件では正当に集中しうる。季節性・過去趨勢で調整して評価する
    hitl: true
    references: [監基報240, 収益認識基準]
  - id: CUTOFF-002
    category: CUTOFF
    name_ja: 未出荷・出荷前の収益認識
    description_ja: 出荷日が収益認識日より後（または出荷記録なし）で計上されている
    assertion: [cutoff, occurrence]
    severity: critical
    base_weight: 34
    detection_ja: ship_date > revenue_recognition_date、または ship_date 欠落かつ point_in_time 認識
    applies_to: transaction
    false_positive_notes_ja: サービス・ライセンス・一定期間履行義務など出荷概念が無い取引では出荷日欠落が正常。取引形態（channel/performance_obligation_status）で除外する
    hitl: true
    references: [収益認識基準, 監基報240]
  - id: CUTOFF-003
    category: CUTOFF
    name_ja: 検収前計上（支配移転前）
    description_ja: 納品・検収日より前に収益を認識している
    assertion: [cutoff, occurrence]
    severity: high
    base_weight: 24
    detection_ja: delivery_date > revenue_recognition_date、かつ検収基準の契約
    applies_to: transaction
    false_positive_notes_ja: 出荷基準を正当に採用する取引、着荷主義でない契約では乖離が正常。契約上の収益認識時点の定義に照らす
    hitl: true
    references: [収益認識基準]
  - id: CUTOFF-004
    category: CUTOFF
    name_ja: 期末計上→翌期取消・返品
    description_ja: 期末に計上した売上が翌期早々に取り消し・返品されている
    assertion: [cutoff, occurrence]
    severity: high
    base_weight: 28
    detection_ja: 期末N日以内計上 かつ reversal_date/credit_memo が翌期初M日以内
    applies_to: transaction
    false_positive_notes_ja: 通常の品質不良・数量違いによる返品も一定率発生する。翌期返品率の水準・特定得意先への集中の有無で判断する
    hitl: true
    references: [監基報240]
  - id: CUTOFF-005
    category: CUTOFF
    name_ja: 帳簿の締め遅延（決算日後計上）
    description_ja: 決算日を過ぎた日付処理で当期に売上を計上している（post-close entries）
    assertion: [cutoff, completeness]
    severity: high
    base_weight: 24
    detection_ja: entry/posting timestamp が決算日以降、かつ会計期間が当期
    applies_to: journal
    false_positive_notes_ja: 決算整理・正当な締め後修正は存在する。承認・根拠証憑の有無、金額規模で切り分ける
    hitl: true
    references: [監基報240, J-SOX販売プロセス]
  - id: CUTOFF-006
    category: CUTOFF
    name_ja: 期末月売上の異常増
    description_ja: 期末月の売上が季節性調整後トレンドから大きく上振れ
    assertion: [cutoff]
    severity: medium
    base_weight: 14
    detection_ja: 季節性・趨勢モデルの予測区間を超える期末月売上
    applies_to: transaction
    false_positive_notes_ja: 新製品投入・大型受注・キャンペーンなど実需による増加もある。要因分解して実態と照合
    hitl: true
    references: [監基報240]

  # ===== FICT: 架空売上・実在性 =====
  - id: FICT-001
    category: FICT
    name_ja: 出荷・納品証憑のない売上
    description_ja: 物品取引でありながら出荷・納品の証憑が存在しない売上
    assertion: [occurrence]
    severity: critical
    base_weight: 34
    detection_ja: 物品 channel かつ shipment/delivery 記録が全欠落、外部出荷確認も取れない
    applies_to: transaction
    false_positive_notes_ja: 役務・デジタル財・現地引渡など出荷記録が本来無い取引を除外。データ連携漏れの可能性も切り分ける
    hitl: true
    references: [監基報240]
  - id: FICT-002
    category: FICT
    name_ja: 新設・初回取引先への高額売上
    description_ja: 設立直後または初回取引の得意先に対する高額計上
    assertion: [occurrence]
    severity: high
    base_weight: 24
    detection_ja: 得意先マスタ登録から短期間 かつ 取引金額が上位分位
    applies_to: transaction
    false_positive_notes_ja: 正当な新規大口顧客の獲得は通常業務。与信審査・契約・入金実績の有無で補強評価する
    hitl: true
    references: [監基報240, ACFE]
  - id: FICT-003
    category: FICT
    name_ja: 入金実績のない売上
    description_ja: 計上後、相当期間を経ても対応する入金が確認できない
    assertion: [occurrence, valuation]
    severity: high
    base_weight: 26
    detection_ja: revenue_recognition_date から X 日超で対応入金なし（bank_receipt 未突合）
    applies_to: transaction
    false_positive_notes_ja: 長期支払サイト・前受・相殺決済・手形では入金遅延が正常。支払条件と決済方法を織り込む
    hitl: true
    references: [監基報240]
  - id: FICT-004
    category: FICT
    name_ja: bill-and-hold（請求済・出荷保留）
    description_ja: 請求・計上済だが物品を出荷せず自社等で保管している
    assertion: [occurrence, cutoff]
    severity: high
    base_weight: 24
    detection_ja: invoice/計上あり かつ ship_date 未到来・保管フラグ
    applies_to: transaction
    false_positive_notes_ja: 顧客要請による正当な bill-and-hold は要件充足で認識可能。契約・顧客依頼・区分保管の証憑で判断する
    hitl: true
    references: [収益認識基準, 監基報240]
  - id: FICT-005
    category: FICT
    name_ja: 期末一括・以降取引消滅
    description_ja: 特定得意先に期末一括大口計上後、以降の取引が途絶える
    assertion: [occurrence]
    severity: medium
    base_weight: 16
    detection_ja: 期末大口計上 かつ 翌期以降の取引継続なし
    applies_to: transaction
    false_positive_notes_ja: スポット・単発プロジェクトでは正常。取引の性質・契約範囲を確認
    hitl: true
    references: [ACFE]
  - id: FICT-006
    category: FICT
    name_ja: 受注・出荷・請求の三点不整合
    description_ja: 受注／出荷／請求のいずれかが欠落したまま計上されている
    assertion: [occurrence, accuracy]
    severity: high
    base_weight: 22
    detection_ja: order/shipment/invoice のリンクが不完全（three-way不成立）
    applies_to: transaction
    false_positive_notes_ja: 業態により受注レス（店頭・EC即時）等は正常。プロセス定義に照らして必須書類を特定する
    hitl: true
    references: [J-SOX販売プロセス]

  # ===== CIRC: 循環取引・関連当事者 =====
  - id: CIRC-001
    category: CIRC
    name_ja: 関連当事者取引の価格乖離
    description_ja: 関連当事者・グループ内取引で市場価格から著しく乖離
    assertion: [accuracy, presentation]
    severity: high
    base_weight: 24
    detection_ja: related_party_flag かつ 単価/粗利が第三者取引の分布から乖離
    applies_to: transaction
    false_positive_notes_ja: グループ内の正当な価格政策・移転価格ポリシーに基づく差はありうる。ポリシー・独立企業間価格の根拠で評価
    hitl: true
    references: [会社法関連当事者, 移転価格]
  - id: CIRC-002
    category: CIRC
    name_ja: 仕入先と得意先の同一性
    description_ja: 同一相手が仕入先かつ得意先（買戻し・還流の兆候）
    assertion: [occurrence, presentation]
    severity: high
    base_weight: 26
    detection_ja: 取引相手が売上・仕入の双方に出現し、金額・時期が相殺的
    applies_to: entity_network
    false_positive_notes_ja: 相互取引が正当な業態（相互OEM等）もある。経済的実体・独立の意思決定の有無を確認
    hitl: true
    references: [監基報240]
  - id: CIRC-003
    category: CIRC
    name_ja: 資金の循環的還流
    description_ja: 短期間で売上・仕入・入出金が環流し実体資金移動が相殺される
    assertion: [occurrence]
    severity: critical
    base_weight: 36
    detection_ja: 取引・資金フローの時系列が閉路を成し、ネット資金移動が僅少
    applies_to: entity_network
    false_positive_notes_ja: 正当なネッティング決済と区別が必要。取引ごとの財・役務の実在と経済合理性を検証する
    hitl: true
    references: [監基報240, 金商法]
  - id: CIRC-004
    category: CIRC
    name_ja: 実体の乏しい介在業者（スルー取引）
    description_ja: 付加価値の不明な業者を経由するin-out取引
    assertion: [occurrence, classification]
    severity: high
    base_weight: 24
    detection_ja: 介在業者で入出荷が同一・粗利僅少・短期反転
    applies_to: entity_network
    false_positive_notes_ja: 商社・物流の正当な介在もある。介在の機能・リスク負担・付加価値を確認
    hitl: true
    references: [監基報240]
  - id: CIRC-005
    category: CIRC
    name_ja: 関連当事者取引の未開示
    description_ja: 開示閾値を超える関連当事者取引が開示されていない
    assertion: [presentation]
    severity: high
    base_weight: 22
    detection_ja: related_party_flag かつ 累計金額が開示基準超で開示リストに不在
    applies_to: customer
    false_positive_notes_ja: 関連当事者判定・重要性の解釈差はありうる。定義と基準への当てはめを確認
    hitl: true
    references: [会社法関連当事者, 金商法]
  - id: CIRC-006
    category: CIRC
    name_ja: 取引ネットワークの循環経路
    description_ja: エンティティ間の取引グラフに循環的な経路が存在
    assertion: [occurrence]
    severity: critical
    base_weight: 34
    detection_ja: entity 取引グラフでサイクル検出（A→B→C→A 等）、金額整合を伴う
    applies_to: entity_network
    false_positive_notes_ja: サプライチェーン上の正当な循環（相互供給）もある。各エッジの財・役務の実在で裏取りする
    hitl: true
    references: [監基報240]

  # ===== RECOG: 収益認識 =====
  - id: RECOG-001
    category: RECOG
    name_ja: 履行義務未充足での前倒し認識
    description_ja: 支配移転前・履行義務未充足の段階で収益を認識
    assertion: [occurrence, cutoff]
    severity: high
    base_weight: 26
    detection_ja: performance_obligation_status = not_satisfied で認識、または充足指標より前
    applies_to: transaction
    false_positive_notes_ja: 一時点/一定期間の判定や支配移転時点の解釈は契約次第。契約条件に照らして評価する
    hitl: true
    references: [収益認識基準]
  - id: RECOG-002
    category: RECOG
    name_ja: 総額・純額の誤り（本人・代理人）
    description_ja: 代理人取引を総額計上しトップラインを水増し
    assertion: [accuracy, presentation]
    severity: high
    base_weight: 24
    detection_ja: gross_net_indicator = agent かつ 総額計上、または支配の指標と不整合
    applies_to: transaction
    false_positive_notes_ja: 本人/代理人の判定は支配の有無に依存し判断を伴う。指標（在庫リスク・価格裁量等）で検討
    hitl: true
    references: [収益認識基準]
  - id: RECOG-003
    category: RECOG
    name_ja: 進捗度の操作（一定期間履行義務）
    description_ja: 進捗度・原価見積りの改訂により収益を恣意的に前倒し
    assertion: [accuracy, cutoff]
    severity: high
    base_weight: 26
    detection_ja: over_time 案件で進捗率が急変、または見積総原価の下方改訂→利益前倒し
    applies_to: transaction
    false_positive_notes_ja: 見積りは合理的に改訂される。改訂の根拠・タイミング・反復性で判断（旧・工事進行基準の論点）
    hitl: true
    references: [収益認識基準, 監基報240]
  - id: RECOG-004
    category: RECOG
    name_ja: 委託・消化仕入を通常売上計上
    description_ja: 委託販売・消化仕入取引を自己の通常売上として計上
    assertion: [occurrence, classification]
    severity: high
    base_weight: 22
    detection_ja: channel = consignment/agent だが通常売上勘定に総額計上
    applies_to: transaction
    false_positive_notes_ja: 契約実態が買取であれば通常売上が正しい。契約上の在庫リスク移転の有無で判定
    hitl: true
    references: [収益認識基準]
  - id: RECOG-005
    category: RECOG
    name_ja: 複数履行義務への配分欠如
    description_ja: 複数の履行義務を含む契約で取引価格の配分がされていない
    assertion: [accuracy]
    severity: medium
    base_weight: 14
    detection_ja: 単一計上だが契約が複数履行義務（物品＋保守等）を含む
    applies_to: transaction
    false_positive_notes_ja: 重要性が乏しい場合や単一履行義務なら配分不要。契約の分解可能性を確認
    hitl: true
    references: [収益認識基準]
  - id: RECOG-006
    category: RECOG
    name_ja: 変動対価の未計上・過少
    description_ja: 返品・リベート等の変動対価を見積計上していない/過少
    assertion: [valuation, completeness]
    severity: medium
    base_weight: 16
    detection_ja: 返品・値引の実績率に対し、変動対価の計上が乖離
    applies_to: transaction
    false_positive_notes_ja: 変動対価の見積りには不確実性がある。見積手法・過去実績との整合を確認
    hitl: true
    references: [収益認識基準]

  # ===== RETURN: 返品・赤伝・変動対価 =====
  - id: RETURN-001
    category: RETURN
    name_ja: 期末売上への翌期高返品（押し込み）
    description_ja: 期末計上分に対する翌期の返品率が異常に高い（チャネルスタッフィング）
    assertion: [occurrence, cutoff]
    severity: high
    base_weight: 28
    detection_ja: 期末計上ロットの翌期返品率が全体平均を大きく上回る
    applies_to: transaction
    false_positive_notes_ja: 季節商材の想定内返品もある。得意先・製品別の集中と水準で押し込みと切り分ける
    hitl: true
    references: [監基報240]
  - id: RETURN-002
    category: RETURN
    name_ja: 赤伝・値引の期ずれ計上
    description_ja: 当期に発生した返品・値引を翌期に繰り延べ計上
    assertion: [cutoff, completeness]
    severity: high
    base_weight: 24
    detection_ja: 返品・値引の発生日と計上日の期またぎ乖離
    applies_to: transaction
    false_positive_notes_ja: 事務処理のタイムラグは一定発生する。金額規模・反復性・期末集中で判断
    hitl: true
    references: [監基報240]
  - id: RETURN-003
    category: RETURN
    name_ja: 特定得意先の異常返品率
    description_ja: 特定得意先の返品率が突出
    assertion: [valuation]
    severity: medium
    base_weight: 14
    detection_ja: 得意先別返品率が分布の外れ値
    applies_to: customer
    false_positive_notes_ja: 品質問題・業態要因（EC等）で高返品率が正常な先もある。原因を確認
    hitl: false
    references: [ACFE]
  - id: RETURN-004
    category: RETURN
    name_ja: リベート・値引の急増/マスタ逸脱
    description_ja: 売上値引・リベートが急増、または契約・マスタの条件から逸脱
    assertion: [accuracy, valuation]
    severity: medium
    base_weight: 16
    detection_ja: 値引率がマスタ/契約条件超、または時系列で急増
    applies_to: transaction
    false_positive_notes_ja: 販促・数量リベートの正当な変動がある。契約・承認との整合で判断
    hitl: true
    references: [J-SOX販売プロセス]
  - id: RETURN-005
    category: RETURN
    name_ja: 返品権付き取引（裏契約）の疑い
    description_ja: 契約書に無い返品権・取消権を伴う疑いのある取引
    assertion: [occurrence, valuation]
    severity: high
    base_weight: 24
    detection_ja: 通信・付随合意に返品/取消条項の示唆、正式契約と不整合
    applies_to: transaction
    false_positive_notes_ja: 正当な返品ポリシーの範囲内なら問題ない。サイドレターの実在・拘束力を検証
    hitl: true
    references: [監基報240, 収益認識基準]

  # ===== PRICE: 価格・数量・粗利 =====
  - id: PRICE-001
    category: PRICE
    name_ja: 単価のマスタ乖離
    description_ja: 適用単価が価格マスタ・価格表から乖離
    assertion: [accuracy]
    severity: medium
    base_weight: 14
    detection_ja: unit_price がマスタ許容レンジ外
    applies_to: transaction
    false_positive_notes_ja: 個別見積・スポット価格・為替は正当に乖離する。承認・見積根拠を確認
    hitl: false
    references: [J-SOX販売プロセス]
  - id: PRICE-002
    category: PRICE
    name_ja: 数量の異常
    description_ja: 数量がマイナス・桁外れ・不自然な丸め
    assertion: [accuracy]
    severity: medium
    base_weight: 12
    detection_ja: quantity の外れ値・負値・過度な丸め
    applies_to: transaction
