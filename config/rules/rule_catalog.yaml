# ===== スコアリング =====
risk_scoring:
  method_ja: |
    各明細のリスクスコアは、発火した全ルールの base_weight を severity 係数で調整して合算し、
    ML 異常スコア（0-100 に正規化）と重み付き統合する。上限 100。
    critical ルールが1つでも発火した場合は、スコアに関わらず高リスクとして人間レビュー対象に含める。
  severity_multiplier:
    low: 0.5
    medium: 1.0
    high: 1.5
    critical: 2.0
  rule_ml_blend:
    rule_weight: 0.6
    ml_weight: 0.4
  notes_ja: 重みは初期値。運用データ（確定/棄却の実績）でキャリブレーションする。モデルリスク管理の対象。

thresholds:
  high: 70          # ファネルの選別ライン。これ以上をエージェント深掘り・人間レビュー対象とする
  medium: 40
  low: 0
  critical_override_ja: critical severity のルール発火は閾値に関わらずレビュー対象
  assertion_gate_ja: |
    occurrence（実在性）と cutoff（期間帰属）は収益の最重要アサーション。
    これらに紐づく high 以上の所見は、閾値未満でもサンプルとしてレビューに含めることを推奨。
